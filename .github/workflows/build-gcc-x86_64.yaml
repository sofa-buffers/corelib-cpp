name: GCC x86_64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake

      - name: Configure with CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++

      - name: Build project
        run: cmake --build build --parallel "$(nproc)"

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --verbose

      # Guard the non-strict UTF-8 build (SOFAB_STRICT_UTF8=0): it must still
      # compile, pass the positive vectors, and skip the invalid_utf8 group.
      - name: Configure (strict UTF-8 OFF)
        run: |
          cmake -S . -B build-utf8-off \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_CXX_FLAGS="-DSOFAB_STRICT_UTF8=0"

      - name: Build project (strict UTF-8 OFF)
        run: cmake --build build-utf8-off --parallel "$(nproc)"

      - name: Run tests (strict UTF-8 OFF)
        working-directory: build-utf8-off
        run: ctest --output-on-failure --verbose
