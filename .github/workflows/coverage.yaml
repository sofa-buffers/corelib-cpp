name: Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake gcovr jq

      - name: Configure with CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSOFAB_ENABLE_COVERAGE=ON

      - name: Build project
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --verbose

      - name: Test coverage report
        run: |
          gcovr \
            --root . \
            --filter '^include/sofab/.*\.hpp$' \
            --exclude-directories '.*/_deps/.*' \
            --object-directory build \
            --print-summary

      - name: Test coverage badge JSON
        run: |
          gcovr \
            --root . \
            --filter '^include/sofab/.*\.hpp$' \
            --exclude-directories '.*/_deps/.*' \
            --object-directory build \
            --json-summary coverage.json
          jq -n --argjson cov "$(<coverage.json)" '
            ($cov.line_covered / $cov.line_total * 100) as $pct |
            {
              schemaVersion: 1,
              label: "gcovr",
              message: ($pct | tostring[0:4] + "%"),
              color: (if $pct >= 90 then "brightgreen" elif $pct >= 75 then "yellow" else "red" end)
            }
          ' > badge.json
          echo "$(<badge.json)"

      - name: Publish coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir badge-out
          cp badge.json badge-out/coverage-cpp.json
          cd badge-out
          git init -q
          git checkout -q -b badges
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage-cpp.json
          git commit -q -m "ci: update C++ coverage badge"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
